<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>3TX | أفضل منيو رقمي وخدمات إعلانية في العراق</title>
    <meta name="description" content="3TX يوفر لك أحدث تقنيات المنيو الرقمي الـ 3D وخدمات التسويق الاحترافية للمطاعم والبراندات في العراق.">
    <link rel="canonical" href="https://nwswmsoso-maker.github.io/3TXmnao/">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --neon-pink: #ff007f; --dark: #050505; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background-color: var(--dark); color: white; overflow-x: hidden; }

        .marquee { background: var(--neon-pink); color: white; padding: 10px 0; font-weight: 900; overflow: hidden; white-space: nowrap; position: sticky; top: 0; z-index: 1000; }
        .marquee div { display: inline-block; animation: scroll 20s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .hero { padding: 30px 20px; text-align: center; }
        .logo-3tx { font-size: 60px; font-weight: 900; text-shadow: 0 0 20px var(--neon-pink); margin: 0; }

        /* إطار الفيديو الاحترافي */
        .video-container {
            max-width: 320px;
            margin: 20px auto;
            border: 3px solid var(--neon-pink);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.5);
            background: #000;
        }
        .video-container video { width: 100%; display: block; }

        .main-display { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* شكل الموبايل الـ 3D */
        .iphone-frame { width: 280px; height: 560px; background: #111; border: 12px solid #222; border-radius: 40px; position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(255,0,127,0.2); animation: float3D 6s infinite ease-in-out; }
        @keyframes float3D { 0% { transform: rotateY(-10deg) translateY(0); } 50% { transform: rotateY(-5deg) translateY(-15px); } 100% { transform: rotateY(-10deg) translateY(0); } }

        .screen { height: 100%; width: 100%; overflow: hidden; }
        .scroll-content { animation: autoScroll 45s infinite linear; }
        @keyframes autoScroll { 0% { transform: translateY(0); } 100% { transform: translateY(-80%); } }

        .item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #222; background: rgba(0,0,0,0.4); }
        .item img { width: 65px; height: 65px; border-radius: 10px; object-fit: cover; }
        .item-info { flex: 1; padding-right: 12px; text-align: right; }
        .item-price { color: var(--neon-pink); font-weight: bold; }

        /* نص نيون ملون */
        .neon-demo-text {
            font-size: 24px; font-weight: 900; margin: 20px 0; text-align: center;
            animation: colorShift 4s infinite linear;
        }
        @keyframes colorShift {
            0% { text-shadow: 0 0 10px #ff007f; color: #ff007f; }
            50% { text-shadow: 0 0 10px #ffcc00; color: #ffcc00; }
            100% { text-shadow: 0 0 10px #ff007f; color: #ff007f; }
        }

        .insta-link { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); color: white; padding: 15px 45px; border-radius: 50px; text-decoration: none; font-weight: 900; margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>

    <div class="marquee">
        <div> ⚡ اطلب منيو مطعمك الآن مع 3TX - تميز بالتقنية والسرعة ⚡ </div>
    </div>

    <header class="hero">
        <h1 class="logo-3tx">3TX</h1>
    </header>

    <div class="video-container">
        <video controls autoplay muted loop playsinline>
            <source src="promo.mp4" type="video/mp4">
            متصفحك لا يدعم تشغيل الفيديو.
        </video>
    </div>

    <div class="main-display">
        <div class="iphone-frame">
            <div class="screen">
                <div class="scroll-content">
                    <div style="background: #111; padding: 40px 10px; text-align: center; border-bottom: 2px solid var(--neon-pink);">
                        <h3 style="margin:0">مطعم الديوان الملكي</h3>
                    </div>
                    <div class="item"><img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=150"><div class="item-info"><h4>كباب عراقي خاص</h4><span class="item-price">14,500 د.ع</span></div></div>
                    <div class="item"><img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=150"><div class="item-info"><h4>بركر لحم ملكي</h4><span class="item-price">11,000 د.ع</span></div></div>
                    <div class="item"><img src="https://images.unsplash.com/photo-1610057099443-fde8c4d50f91?w=150"><div class="item-info"><h4>كنتاكي الديوان</h4><span class="item-price">16,000 د.ع</span></div></div>
                    <div class="item"><img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=150"><div class="item-info"><h4>بيتزا منوعة</h4><span class="item-price">12,000 د.ع</span></div></div>
                    <div class="item"><img src="https://images.unsplash.com/photo-1629814281781-424683050c55?w=150"><div class="item-info"><h4>حلويات ملكية</h4><span class="item-price">8,000 د.ع</span></div></div>
                </div>
            </div>
        </div>

        <div class="neon-demo-text">نموذج بسيط عن المنيو</div>

        <a href="https://www.instagram.com/6.2nr?igsh=NDh6dm1hcnptaDl5" class="insta-link">
            تواصل معنا الآن
        </a>
    </div>

    <footer style="text-align: center; padding: 40px; color: #444; font-size: 11px;"> © 2026 3TX Studio </footer>

</body>
</html>
