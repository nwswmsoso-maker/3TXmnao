<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>3TX | فخامة المنيو الرقمي</title>
    <meta name="description" content="اطلب موقع المنيو الخاص بمطعمك الآن لسهولة الطلب للزبائن.">
    <meta property="og:title" content="3TX - الحلول الرقمية للمطاعم">
    <meta property="og:description" content="حول مطعمك إلى النظام الرقمي مع 3TX. رابط دائم ومدى الحياة.">
    <meta property="og:image" content="https://googleusercontent.com/image_generation_content/0">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --neon-pink: #ff007f; --dark: #050505; --iphone-bg: #0d0d0d; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--dark); color: white; overflow-x: hidden; }

        /* شريط الأخبار المتحرك */
        .marquee { background: var(--neon-pink); color: white; padding: 12px 0; font-weight: 900; overflow: hidden; white-space: nowrap; box-shadow: 0 0 25px var(--neon-pink); position: sticky; top: 0; z-index: 1000; }
        .marquee div { display: inline-block; animation: scroll 25s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* الهيدر */
        .hero { padding: 60px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center;}
        .logo-3tx { font-size: 75px; font-weight: 900; color: #fff; text-shadow: 0 0 10px #fff, 0 0 30px var(--neon-pink); margin: 0; }
        
        /* التعديل الجديد: العبارة الوردية للتواصل */
        .contact-instruction { font-size: 18px; color: var(--neon-pink); margin-top: 10px; font-weight: bold; text-shadow: 0 0 5px var(--neon-pink); letter-spacing: 1px;}

        .main-display { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* هيكل الآيفون */
        .iphone-frame {
            width: 290px; height: 580px; background: #1a1a1a; border: 10px solid #282828;
            border-radius: 45px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            overflow: hidden; outline: 2px solid #333;
        }

        .screen { height: 100%; width: 100%; overflow: hidden; background: var(--iphone-bg); }
        .scroll-content { animation: autoScroll 18s infinite linear; }
        @keyframes autoScroll { 0% { transform: translateY(0); } 100% { transform: translateY(-75%); } }

        .menu-top { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=400'); background-size: cover; padding: 45px 15px 25px; text-align: center; border-bottom: 2px solid var(--neon-pink); }
        .menu-top h3 { color: white; margin: 0; font-size: 22px; font-weight: 900; }
        
        .item { display: flex; align-items: center; padding: 15px 12px; border-bottom: 1px solid #1a1a1a; }
        .item img { width: 65px; height: 65px; border-radius: 10px; object-fit: cover; }
        .item-info { flex: 1; padding-right: 12px; text-align: right; }
        .item-info h4 { margin: 0; font-size: 15px; color: #fff; }
        .item-info p { margin: 4px 0; font-size: 11px; color: #555; }
        .item-price { color: var(--neon-pink); font-weight: 900; font-size: 14px; }

        /* زر التواصل */
        .insta-link {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: white; padding: 18px 50px; border-radius: 50px; text-decoration: none;
            font-weight: 900; font-size: 18px; display: inline-flex; align-items: center; gap: 10px;
            margin-top: 40px; box-shadow: 0 10px 30px rgba(188, 24, 136, 0.4); transition: 0.3s;
        }
        .insta-link:hover { transform: scale(1.05); }

        footer { text-align: center; padding: 40px; color: #1a1a1a; font-size: 10px; }
    </style>
</head>
<body>

    <div class="marquee">
        <div> ⚡ اطلب موقع المنيو الخاص بل مطعم مالتك لسهوله الطلب للزبائن ⚡ - ⚡ تميز بخدمة رقمية سريعة مع 3TX ⚡ - ⚡ اطلب الآن واحصل على تصميمك الخاص ⚡ </div>
    </div>

    <header class="hero">
        <h1 class="logo-3tx">3TX</h1>
        <p class="contact-instruction">للتواصل انستكرام جوه</p>
    </header>

    <div class="main-display">
        <div class="iphone-frame">
            <div class="screen">
                <div class="scroll-content">
                    <div class="menu-top">
                        <h3>مطعم الديوان الملكي</h3>
                    </div>

                    <div class="item">
                        <img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?q=80&w=200">
                        <div class="item-info">
                            <h4>كباب عراقي خاص</h4>
                            <span class="item-price">14,500 د.ع</span>
                        </div>
                    </div>
                    
                    <div class="item">
                        <img src="https://images.unsplash.com/photo-1544025162-d76694265947?q=80&w=200">
                        <div class="item-info">
                            <h4>ستيك ريب آي</h4>
                            <span class="item-price">22,000 د.ع</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <a href="https://www.instagram.com/6.2nr?igsh=NDh6dm1hcnptaDl5" class="insta-link">
            <i class="fab fa-instagram"></i> ابدأ مشروعك الآن
        </a>
    </div>

</body>
</html>
